# golangci-lint v2 config — see AGENTS.md Style. Keep the linter set small and strict.
version: "2"

linters:
  enable:
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - unused

formatters:
  enable:
    - gofumpt
  settings:
    gofumpt:
      # Match standalone gofumpt (D15 tool): treat the module path as local so
      # the two formatters agree on import grouping.
      module-path: cuento

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
