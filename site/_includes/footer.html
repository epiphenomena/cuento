<footer class="site-footer">
  <div class="wrap site-footer__inner">
    <div class="site-footer__brand">
      <span class="site-footer__name">cuento</span>
      <p class="site-footer__tagline">{{ site.tagline }}</p>
    </div>
    <nav class="site-footer__nav" aria-label="Documentation">
      <span class="site-footer__heading">Documentation</span>
      {%- for doc in site.docs -%}
        <a href="{{ doc.url | relative_url }}">{{ doc.title }}</a>
      {%- endfor -%}
    </nav>
    <div class="site-footer__meta">
      <a href="{{ site.repo_url }}" rel="noopener" target="_blank">Repository</a>
      <p class="site-footer__note">One process. One VM. One SQLite file.</p>
    </div>
  </div>
</footer>
