# GitHub Pages deploy workflow — REFERENCE COPY, kept here (not under
# .github/workflows/) on purpose: a Personal Access Token without the `workflow`
# scope is refused by GitHub when a push adds/edits any file under
# .github/workflows/. To avoid forcing a token-scope change, this file lives at
# deploy/ and is added to the repo through the GitHub *web UI* instead (the
# browser session is allowed to commit workflow files):
#
#   1. On github.com: repo -> Actions tab -> "New workflow" -> "set up a workflow
#      yourself". Name the file  pages.yml  and paste the contents BELOW
#      (everything from `name:` down). Commit it to main via the web editor.
#   2. Repo -> Settings -> Pages -> Build and deployment -> Source: "GitHub
#      Actions".
#
# After that the site publishes on every push to main that touches site/**, at
# https://epiphenomena.github.io/cuento/ . The workflow needs no API key or
# secret — it uses the built-in GITHUB_TOKEN.
#
# --- paste from here down into .github/workflows/pages.yml -----------------
name: Deploy site to GitHub Pages

on:
  push:
    branches: ["main"]
    # Only rebuild when the site (or this workflow) changes.
    paths:
      - "site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

# Least-privilege token needed to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One publish at a time; never cancel an in-flight deploy.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby and install the site's gems
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: site

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        working-directory: site
        env:
          JEKYLL_ENV: production

      - name: Upload the built site as a Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
