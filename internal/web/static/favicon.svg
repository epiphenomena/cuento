<?xml version="1.0" encoding="UTF-8"?>
<!-- cuento favicon: the "Open Ledger & Star" mark on a blue tile. Standalone,
     hardcoded brand colors (a favicon never receives the page CSS, so tokens
     can't reach it) — Primary Blue #0072CE tile, white open book with ledger
     rows forming a C, Accent Gold #FFB81C star. Valid, hand-authored SVG. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="cuento">
  <rect width="64" height="64" rx="12" fill="#0072CE"/>
  <!-- Open book: two pages meeting at a center gutter, opening toward the right
       so the outer left edge + rows read as a C. -->
  <g fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- Book outline (covers, spine). -->
    <path d="M32 20 C 26 16, 18 16, 13 18 L 13 46 C 18 44, 26 44, 32 48"/>
    <path d="M32 20 C 38 16, 46 16, 51 18 L 51 46 C 46 44, 38 44, 32 48"/>
    <line x1="32" y1="20" x2="32" y2="48"/>
    <!-- Ledger rows on the left page (the C). -->
    <line x1="18" y1="25" x2="28" y2="25"/>
    <line x1="18" y1="31" x2="28" y2="31"/>
    <line x1="18" y1="37" x2="28" y2="37"/>
  </g>
  <!-- Gold star at the top. -->
  <path fill="#FFB81C" d="M32 4 l1.9 3.9 4.3 .6 -3.1 3 .7 4.3 -3.8 -2 -3.8 2 .7 -4.3 -3.1 -3 4.3 -.6z"/>
</svg>
