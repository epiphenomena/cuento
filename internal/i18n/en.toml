# English catalog (base language), in the go-i18n TOML message format (D15):
# each message is a [key] table with an `other = "value"` field; count messages
# also carry a `one = "value"` form for CLDR pluralization. Values keep %s/%d
# verbs — interpolation is positional fmt.Sprintf in i18n.go, NOT go-i18n {{.X}}
# template data. Every bare `key = value` must precede any [table]; using a table
# per key avoids that TOML ordering trap entirely.
#
# RULE 9 (AGENTS): every user-visible string lives here and in es.toml with an
# IDENTICAL message-ID set (TestCatalogParity enforces it). Real UI keys arrive
# with their features; this is a minimal starter set.

[app.name]
other = "cuento"

# Brand tagline shown on the login page only ("Open Ledger & Star" identity).
# Kept in Spanish in both catalogs by design (it is the brand's own wording, like
# the wordmark) so the mark reads consistently regardless of the UI language.
