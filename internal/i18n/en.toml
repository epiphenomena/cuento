# English catalog (base language). See i18n.go for the supported flat subset:
# `key = "value"` lines, `#` comments, blank lines, double-quoted values with
# \n / \" / \\ escapes. This is NOT full TOML — the .toml extension is only for
# editor syntax familiarity.
#
# RULE 9 (AGENTS): every user-visible string lives here and in es.toml with an
# IDENTICAL key set (TestCatalogParity enforces it). Real UI keys arrive with
# their features; this is a minimal starter set.

app.name = "cuento"

# Brand tagline shown on the login page only ("Open Ledger & Star" identity).
# Kept in Spanish in both catalogs by design (it is the brand's own wording, like
# the wordmark) so the mark reads consistently regardless of the UI language.
brand.tagline = "contabilidad abierta para el bien común"

# Authenticated landing placeholder (p06.3). The real dashboard/nav is phase 10;
# GET /{$} renders this so the AnyUser permission path is exercised by a real,
# i18n'd route rather than a stub.
home.title = "cuento"
home.welcome = "Signed in."

common.save = "Save"
common.cancel = "Cancel"
common.skip_to_content = "Skip to content"

# Authenticated shell (p10.2): the top-level navigation sections (Appendix F).
# Each entry renders only for permitted personas AND only once its route exists;
# later phases (p11-p18) wire the remaining sections as their routes land.
nav.label = "Primary"
nav.home = "Home"
nav.accounts = "Accounts"
nav.funds = "Funds"
nav.programs = "Programs"
nav.reconciliations = "Reconciliations"
nav.reports = "Reports"
nav.settings = "Settings"
nav.admin = "Admin"

# Theme control (p10.2). Values map to data-theme (auto follows the OS).
theme.label = "Theme"
theme.light = "Light"
theme.dark = "Dark"
theme.auto = "Auto"
theme.apply = "Apply"

# Language switcher on the login page (p10.2). Each language is labelled in its
# OWN tongue (lang.<code> is the same in every catalog) so a speaker recognizes
# their language regardless of the page's current locale.
lang.label = "Language"
lang.en = "English"
lang.es = "Español"

# Footer.
footer.version = "Version %s"

# Dev-only styleguide (p10.2): a visual review page for the component primitives.
styleguide.title = "Styleguide"
styleguide.brand = "Brand"
styleguide.palette = "Palette"
styleguide.buttons = "Buttons"
styleguide.forms = "Forms"
styleguide.alerts = "Alerts"

# Dev-only form-error demonstrator (p10.3): a tiny validated POST that exercises
# the reusable form-error convention (422 + form-region partial swap, localized
# field errors, autofocus on the first invalid field). The heavy forms (accounts
# p11, transactions p12) REUSE this convention.
styleguide.form_demo = "Form errors"
form.demo.name = "Name"
form.demo.email = "Email"
form.demo.submit = "Submit"
form.demo.ok = "Looks good."

# Reusable field-validation error KEYS (rule 9: Go returns keys, the template
# renders them via {{t}}). Later forms reuse these generic messages.
error.required = "This field is required."
error.email = "Enter a valid email address."

# My settings stub (p10.2); the full settings page is p13.1.
settings.title = "Settings"
settings.coming_soon = "Settings arrive in a later step."

# Admin landing stub (p10.2); the real admin pages arrive in later phases.
admin.coming_soon = "Admin tools arrive in a later step."

# Label for a NULL fund_id (unrestricted general fund), per D20.
fund.unrestricted = "Unrestricted General"

# Positional-interpolation sample (%s), exercised by TestInterpolation.
greeting = "Hello, %s"

# Login page (p06.2). The auth.invalid / auth.rate_limited errors are
# deliberately generic: a uniform message that does not reveal whether a
# username exists (no user enumeration, rule 13).
auth.login_title = "Sign in"
