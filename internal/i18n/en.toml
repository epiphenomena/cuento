# English catalog (base language). See i18n.go for the supported flat subset:
# `key = "value"` lines, `#` comments, blank lines, double-quoted values with
# \n / \" / \\ escapes. This is NOT full TOML — the .toml extension is only for
# editor syntax familiarity.
#
# RULE 9 (AGENTS): every user-visible string lives here and in es.toml with an
# IDENTICAL key set (TestCatalogParity enforces it). Real UI keys arrive with
# their features; this is a minimal starter set.

app.name = "cuento"

# Authenticated landing placeholder (p06.3). The real dashboard/nav is phase 10;
# GET /{$} renders this so the AnyUser permission path is exercised by a real,
# i18n'd route rather than a stub.
home.title = "cuento"
home.welcome = "Signed in."

common.save = "Save"
common.cancel = "Cancel"

# Label for a NULL fund_id (unrestricted general fund), per D20.
fund.unrestricted = "Unrestricted General"

# Positional-interpolation sample (%s), exercised by TestInterpolation.
greeting = "Hello, %s"

# Login page (p06.2). The auth.invalid / auth.rate_limited errors are
# deliberately generic: a uniform message that does not reveal whether a
# username exists (no user enumeration, rule 13).
auth.login_title = "Sign in"
auth.username = "Username"
auth.password = "Password"
auth.sign_in = "Sign in"
auth.sign_out = "Sign out"
auth.invalid = "Incorrect username or password."
auth.rate_limited = "Too many attempts. Please wait and try again."
