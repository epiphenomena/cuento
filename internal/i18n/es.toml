# Spanish catalog. Same flat subset and the SAME key set as en.toml
# (TestCatalogParity enforces identical keys in both directions).

app.name = "cuento"

# Marcador de la pagina de inicio autenticada (p06.3). El panel/nav real es la
# fase 10; GET /{$} muestra esto para ejercer la ruta AnyUser con una ruta real
# e internacionalizada en vez de un stub.
home.title = "cuento"
home.welcome = "Sesion iniciada."

common.save = "Guardar"
common.cancel = "Cancelar"
common.skip_to_content = "Ir al contenido"

# Shell autenticado (p10.2): las secciones de navegacion de nivel superior
# (Apendice F). Cada entrada se muestra solo para personas permitidas Y solo
# cuando su ruta existe; fases posteriores (p11-p18) conectan el resto.
nav.label = "Principal"
nav.home = "Inicio"
nav.accounts = "Cuentas"
nav.funds = "Fondos"
nav.programs = "Programas"
nav.reconciliations = "Conciliaciones"
nav.reports = "Informes"
nav.settings = "Ajustes"
nav.admin = "Administracion"

# Control de tema (p10.2). Los valores mapean a data-theme (auto sigue al SO).
theme.label = "Tema"
theme.light = "Claro"
theme.dark = "Oscuro"
theme.auto = "Automatico"
theme.apply = "Aplicar"

# Selector de idioma en la pagina de inicio de sesion (p10.2). Cada idioma se
# etiqueta en SU propia lengua (lang.<code> es identico en cada catalogo).
lang.label = "Idioma"
lang.en = "English"
lang.es = "Español"

# Pie de pagina.
footer.version = "Version %s"

# Guia de estilos solo en dev (p10.2): revision visual de los componentes.
styleguide.title = "Guia de estilos"
styleguide.buttons = "Botones"
styleguide.forms = "Formularios"
styleguide.alerts = "Alertas"

# Ajustes (stub, p10.2); la pagina completa es p13.1.
settings.title = "Ajustes"
settings.coming_soon = "Los ajustes llegan en un paso posterior."

# Landing de administracion (stub, p10.2); las paginas reales llegan despues.
admin.coming_soon = "Las herramientas de administracion llegan en un paso posterior."

# Etiqueta para un fondo sin restricciones (fund_id NULL), segun D20.
fund.unrestricted = "Fondo General No Restringido"

# Muestra de interpolacion posicional (%s), usada por TestInterpolation.
greeting = "Hola, %s"

# Pagina de inicio de sesion (p06.2). Los errores auth.invalid /
# auth.rate_limited son deliberadamente genericos: un mensaje uniforme que no
# revela si un usuario existe (sin enumeracion de usuarios, regla 13).
auth.login_title = "Iniciar sesion"
auth.username = "Usuario"
auth.password = "Contraseña"
auth.sign_in = "Iniciar sesion"
auth.sign_out = "Cerrar sesion"
auth.invalid = "Usuario o contraseña incorrectos."
